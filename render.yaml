
services:
  - type: web
    name: gnr-footwear
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn backend.app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gnr-db
          property: connectionString

databases:
  - name: gnr-db