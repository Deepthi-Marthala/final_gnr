<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1a1a22;
  padding:40px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#7C3AED;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#error{
  color:red;
  font-size:13px;
  margin-top:10px;
}

#dashboard{
  display:none;
  padding:20px;
}

.tab{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>Owner Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Stock Manager</h2>

  <div id="stockPage" class="tab">
    <p>✅ Welcome Owner! You can manage stock here.</p>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');

  error.textContent = "";

  if(!email || !password){
    error.textContent = "Enter email & password";
    return;
  }

  try{
    const res = await fetch('/api/owner/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email,password})
    });

    const data = await res.json();

    if(!data.success){
      error.textContent = "❌ Only owner can login";
      return;
    }

    // SUCCESS LOGIN
    document.getElementById('loginScreen').style.display="none";
    document.getElementById('dashboard').style.display="block";

    // AUTO OPEN STOCK PAGE
    openStock();

  }catch(e){
    error.textContent="Server error";
  }
}

function openStock(){
  document.getElementById('stockPage').style.display="block";
}
</script>

</body>
</html>
